<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c4dff"/>
      <stop offset="50%" stop-color="#e040fb"/>
      <stop offset="100%" stop-color="#536dfe"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e040fb"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>

  <!-- Outer subtle ring -->
  <circle cx="256" cy="256" r="180" stroke="#7c4dff" stroke-width="2" opacity="0.15"/>
  <circle cx="256" cy="256" r="160" stroke="#7c4dff" stroke-width="1" opacity="0.1"/>

  <!-- Hexagonal crystal structure -->
  <g transform="translate(256, 220)" opacity="0.08" fill="none" stroke="#e040fb" stroke-width="1.5">
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60"/>
    <polygon points="0,-180 156,-90 156,90 0,180 -156,90 -156,-90"/>
  </g>

  <!-- Central geometric "A" -->
  <g transform="translate(256, 230)">
    <!-- Left stroke -->
    <line x1="-72" y1="82" x2="0" y2="-86" stroke="url(#grad1)" stroke-width="32" stroke-linecap="round"/>
    <!-- Right stroke -->
    <line x1="72" y1="82" x2="0" y2="-86" stroke="url(#grad1)" stroke-width="32" stroke-linecap="round"/>
    <!-- Crossbar -->
    <line x1="-44" y1="28" x2="44" y2="28" stroke="url(#grad2)" stroke-width="24" stroke-linecap="round"/>
    <!-- Top accent dot -->
    <circle cx="0" cy="-86" r="10" fill="#e040fb"/>
  </g>

  <!-- Floating data points -->
  <g opacity="0.3">
    <rect x="120" y="370" width="4" height="4" rx="2" fill="#536dfe"/>
    <rect x="130" y="355" width="4" height="4" rx="2" fill="#7c4dff"/>
    <rect x="142" y="362" width="4" height="4" rx="2" fill="#e040fb"/>
    <rect x="140" y="345" width="3" height="3" rx="1.5" fill="#536dfe"/>

    <rect x="370" y="365" width="4" height="4" rx="2" fill="#e040fb"/>
    <rect x="358" y="348" width="4" height="4" rx="2" fill="#7c4dff"/>
    <rect x="380" y="350" width="3" height="3" rx="1.5" fill="#536dfe"/>
    <rect x="365" y="378" width="4" height="4" rx="2" fill="#536dfe"/>
  </g>

  <!-- K-line miniature bars at bottom -->
  <g transform="translate(256, 410)" opacity="0.15">
    <rect x="-48" y="-8" width="4" height="32" rx="2" fill="#00c853"/>
    <line x1="-46" y1="-14" x2="-46" y2="24" stroke="#00c853" stroke-width="1"/>
    <rect x="-32" y="-16" width="4" height="16" rx="2" fill="#ff1744"/>
    <line x1="-30" y1="-22" x2="-30" y2="0" stroke="#ff1744" stroke-width="1"/>
    <rect x="-16" y="4" width="4" height="28" rx="2" fill="#00c853"/>
    <line x1="-14" y1="-2" x2="-14" y2="32" stroke="#00c853" stroke-width="1"/>
    <rect x="0" y="-12" width="4" height="24" rx="2" fill="#00c853"/>
    <line x1="2" y1="-20" x2="2" y2="14" stroke="#00c853" stroke-width="1"/>
    <rect x="16" y="0" width="4" height="14" rx="2" fill="#ff1744"/>
    <line x1="18" y1="-10" x2="18" y2="14" stroke="#ff1744" stroke-width="1"/>
    <rect x="32" y="-8" width="4" height="30" rx="2" fill="#00c853"/>
    <line x1="34" y1="-16" x2="34" y2="24" stroke="#00c853" stroke-width="1"/>
    <rect x="48" y="8" width="4" height="10" rx="2" fill="#ff1744"/>
    <line x1="50" y1="-4" x2="50" y2="18" stroke="#ff1744" stroke-width="1"/>
  </g>
</svg>
